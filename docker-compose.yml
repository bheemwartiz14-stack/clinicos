services:
  postgres:
    image: postgres:16-alpine
    container_name: mediclinic-postgres
    environment:
      POSTGRES_DB: mediclinic
      POSTGRES_USER: mediclinic
      POSTGRES_PASSWORD: mediclinic
    ports:
      - "5432:5432"
    volumes:
      - mediclinic_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediclinic -d mediclinic"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mediclinic_postgres:
