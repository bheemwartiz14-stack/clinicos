services:
  postgres:
    image: postgres:16-alpine
    container_name: mediclinic-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mediclinic}
      POSTGRES_USER: ${POSTGRES_USER:-mediclinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediclinic}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mediclinic_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediclinic-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - mediclinic_redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mediclinic_postgres:
  mediclinic_redis: